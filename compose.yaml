version: '3.9'

services:

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - prova-network

  api-pedidos:
    build:
      context: .
      dockerfile: ./api-pedidos/Dockerfile
    container_name: api-pedidos
    ports:
      - "8081:8081"
    networks:
      - prova-network

networks:
  prova-network:
    driver: bridge